name: Android build

# Builds an Android APK on an Ubuntu runner: installs Node deps, generates the
# native Capacitor project (gitignored), syncs the shared web UI, then assembles
# with Gradle.
#
# Signing: if the ANDROID_KEYSTORE_BASE64 secret is set, a *signed release* APK
# is produced; otherwise it falls back to a debug APK. See apps/android/README.md
# for how to create the keystore and add the four secrets.
#
# Triggers:
#   • Manually  → Actions tab → "Android build" → Run workflow (uploads the APK)
#   • On a v* tag → also attaches the APK to that GitHub Release
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: apps/android
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project
        run: npx cap add android

      - name: Sync shared web UI + plugins
        run: npx cap sync android

      - name: Prepare signing (if configured)
        id: signing
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Keystore present → building a SIGNED RELEASE APK."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "No ANDROID_KEYSTORE_BASE64 secret → building a DEBUG APK."
          fi

      - name: Build APK
        working-directory: apps/android/android
        env:
          STORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            ./gradlew assembleRelease --no-daemon \
              -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.jks" \
              -Pandroid.injected.signing.store.password="$STORE_PW" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PW"
          else
            ./gradlew assembleDebug --no-daemon
          fi

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: today-android-apk
          if-no-files-found: error
          path: apps/android/android/app/build/outputs/apk/**/*.apk

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Today ${{ github.ref_name }}
          files: apps/android/android/app/build/outputs/apk/**/*.apk
