name: Windows build

# Compiles the Tauri (Windows) app into .msi + .exe installers on a Windows
# runner — so real Windows builds happen in CI without owning a Windows machine.
#
# Triggers:
#   • Manually  → Actions tab → "Windows build" → Run workflow (uploads artifacts)
#   • On a v* tag → also attaches the installers to that GitHub Release
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "apps/windows/src-tauri -> target"

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI
        run: cargo binstall -y tauri-cli

      - name: Generate app icons
        working-directory: apps/windows
        run: cargo tauri icon ../../web/assets/icon-1024.png

      - name: Build installers
        working-directory: apps/windows
        run: cargo tauri build

      - name: Upload installers (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: today-windows-installers
          if-no-files-found: error
          path: |
            apps/windows/src-tauri/target/release/bundle/msi/*.msi
            apps/windows/src-tauri/target/release/bundle/nsis/*.exe

      - name: Attach to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/windows/src-tauri/target/release/bundle/msi/*.msi
            apps/windows/src-tauri/target/release/bundle/nsis/*.exe
