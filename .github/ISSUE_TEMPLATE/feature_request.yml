name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or use case behind the request.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
  - type: dropdown
    id: platform
    attributes:
      label: Which platform(s)?
      multiple: true
      options:
        - All / shared web UI
        - macOS
        - Windows
        - Android
        - Web / PWA
        - Chrome extension
        - Figma / FigJam
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about.
