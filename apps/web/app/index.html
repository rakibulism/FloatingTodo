<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Today</title>
<meta name="description" content="Your floating to-do list — installable, offline, with daily must-do tasks." />
<meta name="theme-color" content="#050507" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="app.css" />
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="greet">Today</div>
      <div class="date"></div>
    </div>
    <div class="head-actions">
      <button class="icon-btn" id="speak-btn" aria-label="Read my list aloud" title="Read aloud">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4V5Z"/><path d="M16 9a4 4 0 0 1 0 6"/><path d="M19 6a8 8 0 0 1 0 12"/></svg>
      </button>
      <button class="icon-btn" id="settings-btn" aria-label="Settings" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 7 19.4a1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0-1.2-2.9H1a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 2.6 7a1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H7a1.7 1.7 0 0 0 1-1.5V1a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 2.9 1.2 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V7a1.7 1.7 0 0 0 1.5 1H23a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"/></svg>
      </button>
    </div>
  </header>

  <div class="install">
    <img src="icons/icon-192.png" alt="" />
    <div class="txt">Install Today<small>Add it to your dock or home screen.</small></div>
    <button class="go">Install</button>
    <button class="x" aria-label="Dismiss">✕</button>
  </div>

  <div class="add">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
    <input id="add-input" type="text" placeholder="Add a task…" autocomplete="off" enterkeyhint="done" />
  </div>

  <div class="list"></div>

  <footer>
    <span class="count">0 left</span>
    <button class="clear" style="display:none">Clear completed</button>
  </footer>
</div>

<dialog id="settings">
  <div class="sheet">
    <h2>Settings <button class="icon-btn" id="set-done-x" onclick="document.getElementById('settings').close()" aria-label="Close">✕</button></h2>
    <div class="opt">
      <div class="label">Read pending tasks aloud<small>Male voice, on launch (installed app)</small></div>
      <div class="switch" id="sw-speak"></div>
    </div>
    <div class="opt">
      <div class="label">Hourly reminders<small>Notification while the app is open</small></div>
      <div class="switch" id="sw-notify"></div>
    </div>
    <div class="sub">MUST-DO EVERY DAY</div>
    <div id="set-must"></div>
    <div class="addmust">
      <input id="add-must-input" type="text" placeholder="New daily must-do…" autocomplete="off" />
      <button id="add-must-btn">Add</button>
    </div>
    <button class="done" id="set-done">Done</button>
  </div>
</dialog>

<script type="module" src="ui.js"></script>
</body>
</html>
