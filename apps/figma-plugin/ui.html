<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  :root {
    --bg: #0a0a0c; --surface: rgba(255,255,255,0.05); --text: #eef0f5; --muted: #9aa0b0;
    --faint: #6b7180; --border: rgba(255,255,255,0.1); --accent: #6a78ff; --red: #ff5b6e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text);
    -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; height: 100vh; }
  header { padding: 16px 16px 10px; }
  h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .add { display: flex; align-items: center; gap: 9px; margin: 0 16px 12px; padding: 10px 12px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
  .add svg { flex: none; color: var(--accent); }
  .add input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 13px; font-family: inherit; }
  .add input::placeholder { color: var(--faint); }
  .list { flex: 1; overflow-y: auto; padding: 0 10px 8px; }
  .label { font-size: 10px; font-weight: 800; letter-spacing: 0.07em; color: var(--red); margin: 8px 6px 6px; display: flex; align-items: center; gap: 6px; }
  .row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 13px; }
  .row:hover { background: var(--surface); }
  .row.must { background: rgba(255,91,110,0.06); }
  .ring { width: 16px; height: 16px; border-radius: 50%; border: 1.6px solid var(--faint); flex: none; cursor: pointer; display: grid; place-items: center; }
  .row.must .ring { border-color: var(--red); }
  .ring.done { border: none; background: var(--accent); }
  .ring svg { width: 10px; height: 10px; opacity: 0; } .ring.done svg { opacity: 1; }
  .row .t { flex: 1; } .row.done .t { color: var(--faint); text-decoration: line-through; }
  .row .del { opacity: 0; color: var(--faint); cursor: pointer; background: none; border: none; font-size: 14px; }
  .row:hover .del { opacity: 1; }
  .empty { text-align: center; color: var(--muted); padding: 40px 16px; font-size: 13px; line-height: 1.5; }
  footer { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--border); }
  footer .count { flex: 1; align-self: center; font-size: 12px; color: var(--muted); }
  button.act { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 9px 14px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  button.ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; font-size: 13px; cursor: pointer; font-family: inherit; }
</style>
</head>
<body>
  <header><h1 id="greet">Today</h1><div class="sub" id="date"></div></header>
  <div class="add">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
    <input id="input" type="text" placeholder="Add a task… (⏎)" autocomplete="off" />
  </div>
  <div class="list" id="list"></div>
  <footer>
    <span class="count" id="count">0 left</span>
    <button class="ghost" id="clear">Clear done</button>
    <button class="act" id="insert">Insert on canvas</button>
  </footer>

<script>
  let data = { todos: [], must: [] };
  const $ = (s) => document.querySelector(s);
  const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  const isToday = (ts) => ts && new Date(ts).toDateString() === new Date().toDateString();
  const post = (m) => parent.postMessage({ pluginMessage: m }, "*");
  const save = () => post({ type: "save", data });

  function greeting() { const h = new Date().getHours(); return h < 12 ? "Good morning" : h < 17 ? "Good afternoon" : h < 22 ? "Good evening" : "Late night"; }
  const CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';

  function render() {
    $("#greet").textContent = greeting();
    $("#date").textContent = new Date().toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" });
    const list = $("#list"); list.innerHTML = "";
    const mk = (item, must) => {
      const done = must ? isToday(item.lastCompleted) : item.done;
      const row = document.createElement("div");
      row.className = "row" + (done ? " done" : "") + (must ? " must" : "");
      const ring = document.createElement("div");
      ring.className = "ring" + (done ? " done" : ""); ring.innerHTML = CHECK;
      ring.onclick = () => { toggle(item, must); };
      const t = document.createElement("span"); t.className = "t"; t.textContent = item.title;
      row.append(ring, t);
      if (!must) { const d = document.createElement("button"); d.className = "del"; d.textContent = "✕"; d.onclick = () => { data.todos = data.todos.filter((x) => x.id !== item.id); save(); render(); }; row.append(d); }
      return row;
    };
    if (data.must.length) { const l = document.createElement("div"); l.className = "label"; l.textContent = "🔒 MUST DO TODAY"; list.append(l); data.must.forEach((m) => list.append(mk(m, true))); }
    if (!data.todos.length && !data.must.length) { const e = document.createElement("div"); e.className = "empty"; e.innerHTML = "Nothing yet.<br>Add what you don't want to forget."; list.append(e); }
    data.todos.forEach((t) => list.append(mk(t, false)));
    const left = data.todos.filter((t) => !t.done).length + data.must.filter((m) => !isToday(m.lastCompleted)).length;
    $("#count").textContent = left + " left";
  }
  function toggle(item, must) {
    if (must) { const m = data.must.find((x) => x.id === item.id); m.lastCompleted = isToday(m.lastCompleted) ? null : Date.now(); }
    else { const t = data.todos.find((x) => x.id === item.id); t.done = !t.done; data.todos.sort((a, b) => (a.done === b.done ? 0 : a.done ? 1 : -1)); }
    save(); render();
  }
  $("#input").addEventListener("keydown", (e) => { if (e.key === "Enter" && e.target.value.trim()) { data.todos.unshift({ id: uid(), title: e.target.value.trim(), done: false }); e.target.value = ""; save(); render(); } });
  $("#clear").onclick = () => { data.todos = data.todos.filter((t) => !t.done); save(); render(); };
  $("#insert").onclick = () => post({ type: "insert", data });

  onmessage = (e) => { const m = e.data.pluginMessage; if (m && m.type === "data") { data = m.data; render(); } };
  post({ type: "ready" });
</script>
</body>
</html>
